<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Player — Реальное видео в одном файле</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #111111;
            --bg-card: #1b1b1b;
            --orange: #ffa500;
            --text-light: #eeeeee;
            --text-gray: #999999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-light);
            padding-top: 70px;
        }

        /* Шапка */
        header {
            background-color: #000;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 1px solid #282828;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
        }

        .logo span {
            background-color: var(--orange);
            color: black;
            padding: 4px 8px;
            border-radius: 4px;
            margin-left: 4px;
            font-weight: 900;
        }

        /* Контейнер сетки */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #282828;
        }

        /* Сетка для видео */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 30px;
        }

        @media (max-width: 500px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Карточка с фреймом */
        .video-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #282828;
        }

        /* Пропорции 16:9 для адаптивного iframe */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-details {
            padding: 15px;
        }

        .video-details h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .rating {
            color: #2ed573;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Video<span>hub</span></a>
    </header>

    <main class="container">
        <h2 class="section-title"><i class="fa-solid fa-play"></i> Прямая трансляция контента (Плееры без сервера)</h2>

        <div class="video-grid">

            <!-- Плеер 1 -->
            <div class="video-card">
                <div class="iframe-wrapper">
                    <!-- Используется официальный открытый embed-код контент-провайдера -->
                    <iframe src="https://embed.redtube.com/?id=40602911" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h3>Популярное видео #1</h3>
                    <div class="video-meta">
                        <span>Embed Stream</span>
                        <span class="rating">97% Лайков</span>
                    </div>
                </div>
            </div>

            <!-- Плеер 2 -->
            <div class="video-card">
                <div class="iframe-wrapper">
                    <iframe src="https://embed.redtube.com/?id=40552731" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h3>Популярное видео #2</h3>
                    <div class="video-meta">
                        <span>Embed Stream</span>
                        <span class="rating">95% Лайков</span>
                    </div>
                </div>
            </div>

            <!-- Плеер 3 -->
            <div class="video-card">
                <div class="iframe-wrapper">
                    <iframe src="https://embed.redtube.com/?id=39891821" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h3>Популярное видео #3</h3>
                    <div class="video-meta">
                        <span>Embed Stream</span>
                        <span class="rating">93% Лайков</span>
                    </div>
                </div>
            </div>

            <!-- Плеер 4 -->
            <div class="video-card">
                <div class="iframe-wrapper">
                    <iframe src="https://embed.redtube.com/?id=40310241" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h3>Популярное видео #4</h3>
                    <div class="video-meta">
                        <span>Embed Stream</span>
                        <span class="rating">96% Лайков</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
